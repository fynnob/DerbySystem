<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Race Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="/DerbySystem/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/DerbySystem/lib/router.js"></script>
  <script src="/DerbySystem/lib/api.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0d14; --surface: #131620; --card: #1a1e2e; --border: #252a3d;
      --amber: #f59e0b; --amber-dim: #7a4e06; --text: #e8eaf2; --muted: #6b738f;
      --gold: #ffd700; --silver: #b8bec8; --bronze: #cd7f32; --green: #22c55e;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      height: 100vh; overflow: hidden;
      display: grid; grid-template-rows: auto 1fr;
    }
    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 40px; height: 72px;
      display: flex; align-items: center; justify-content: space-between; gap: 24px;
    }
    .hdr-brand { display: flex; flex-direction: column; }
    .hdr-brand .title { font-size: 1.4rem; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; color: var(--amber); line-height: 1; }
    .hdr-brand .subtitle { font-size: 0.65rem; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-top: 3px; }
    .hdr-heat { text-align: center; flex: 1; }
    .hdr-heat .heat-main { font-size: 1.1rem; font-weight: 800; letter-spacing: 1px; color: var(--text); }
    .hdr-live { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }
    .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;}50%{opacity:0.4;} }
    .display-body { display: grid; grid-template-columns: 1fr 1fr; overflow: hidden; }
    .panel { display: flex; flex-direction: column; padding: 32px 40px; overflow: hidden; }
    .panel-left { border-right: 1px solid var(--border); }
    .panel-label { font-size: 0.65rem; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; color: var(--amber); margin-bottom: 24px; flex-shrink: 0; }
    .lane-rows { display: flex; flex-direction: column; gap: clamp(8px, 1.5vh, 20px); flex: 1; overflow: hidden; }
    .lane-row { display: flex; align-items: stretch; border-radius: 16px; background: var(--card); border: 1px solid var(--border); overflow: hidden; flex: 1; }
    .lane-stripe { width: 8px; flex-shrink: 0; }
    .s1 { background: #e53e3e; } .s2 { background: #3182ce; } .s3 { background: #38a169; } .s4 { background: #d69e2e; }
    .lane-inner { display: flex; flex-direction: column; justify-content: center; padding: 20px 28px; }
    .ln-badge { font-size: 0.65rem; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .ln-name { font-size: clamp(2.5rem, 4.5vw, 5rem); font-weight: 900; line-height: 1; letter-spacing: -1px; }
    .ln-num { font-size: 0.9rem; font-weight: 700; color: var(--muted); white-space: nowrap; }
    .board-rows { display: flex; flex-direction: column; gap: clamp(6px, 1.2vh, 16px); flex: 1; overflow: hidden; }
    .board-row { display: grid; grid-template-columns: 60px 64px 1fr auto; align-items: center; gap: 16px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px 24px; flex: 1; }
    .board-row.pos-1 { border-color: var(--gold); background: rgba(255,215,0,0.06); }
    .board-row.pos-2 { border-color: var(--silver); background: rgba(184,190,200,0.06); }
    .board-row.pos-3 { border-color: var(--bronze); background: rgba(205,127,50,0.06); }
    .bd-rank { font-size: clamp(0.9rem, 1.2vw, 1.2rem); font-weight: 900; color: var(--muted); }
    .board-row.pos-1 .bd-rank { color: var(--gold); }
    .board-row.pos-2 .bd-rank { color: var(--silver); }
    .board-row.pos-3 .bd-rank { color: var(--bronze); }
    .bd-carnum { font-size: clamp(1.4rem, 2vw, 2.2rem); font-weight: 900; color: var(--amber); }
    .bd-name { font-size: clamp(1.8rem, 2.8vw, 3.2rem); font-weight: 800; }
    .bd-pts { font-size: 0.9rem; font-weight: 700; color: var(--muted); white-space: nowrap; }
    .idle-state { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 14px; color: var(--muted); }
    .idle-state .idle-icon { font-size: 4rem; opacity: 0.4; }
    .idle-state p { font-size: 1.1rem; font-weight: 600; letter-spacing: 1px; }
    @media (max-width: 900px) { .display-body { grid-template-columns: 1fr; overflow: auto; } body { overflow: auto; } }
    .podium-overlay {
      position: fixed; inset: 0; background: var(--bg); z-index: 500;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 40px;
    }
    .podium-overlay.active { display: flex; }
    .podium-title { font-size: 1.2rem; font-weight: 800; letter-spacing: 6px; text-transform: uppercase; color: var(--amber); margin-bottom: 48px; }
    .podium-blocks { display: flex; align-items: flex-end; justify-content: center; gap: 24px; margin-bottom: 40px; }
    .podium-block { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .podium-label { font-size: 1.8rem; font-weight: 900; opacity: 0; }
    .podium-label.revealed { opacity: 1; }
    .podium-car { font-size: 1.1rem; font-weight: 700; color: var(--text); opacity: 0; min-height: 2.6em; }
    .podium-car.revealed { opacity: 1; }
    .podium-pedestal { width: 160px; border-radius: 12px 12px 0 0; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 900; color: rgba(255,255,255,0.3); }
    .ped-1 { height: 200px; background: linear-gradient(180deg, #ffd700 0%, #b8860b 100%); }
    .ped-2 { height: 150px; background: linear-gradient(180deg, #c0c0c0 0%, #808080 100%); }
    .ped-3 { height: 110px; background: linear-gradient(180deg, #cd7f32 0%, #8b4513 100%); }
    .podium-rest { margin-top: 32px; font-size: 0.9rem; color: var(--muted); max-width: 600px; line-height: 1.8; }
  </style>
</head>
<body>

<header>
  <div class="hdr-brand">
    <div class="title" id="hdrTitle">Derby</div>
    <div class="subtitle" id="hdrSubtitle">Race Day</div>
  </div>
  <div class="hdr-heat">
    <div class="heat-main" id="heatInfoText">Loading…</div>
  </div>
  <div class="hdr-live">
    <div class="live-dot"></div>
    Live
  </div>
</header>

<div class="display-body">
  <div class="panel panel-left">
    <div class="panel-label">Now on Track</div>
    <div class="lane-rows" id="laneRows">
      <div class="idle-state"><div class="idle-icon">⏳</div><p>Waiting to start</p></div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-label">Standings</div>
    <div class="board-rows" id="boardRows">
      <div class="idle-state"><div class="idle-icon">🏆</div><p>No results yet</p></div>
    </div>
  </div>
</div>

<!-- Podium overlay -->
<div class="podium-overlay" id="podiumOverlay">
  <div class="podium-title">🏆 Final Results</div>
  <div class="podium-blocks">
    <div class="podium-block">
      <div class="podium-car" id="pod-car-2">—</div>
      <div class="podium-label" id="pod-label-2" style="color:var(--silver);">🥈</div>
      <div class="podium-pedestal ped-2">2</div>
    </div>
    <div class="podium-block">
      <div class="podium-car" id="pod-car-1">—</div>
      <div class="podium-label" id="pod-label-1" style="color:var(--gold);">🥇</div>
      <div class="podium-pedestal ped-1">1</div>
    </div>
    <div class="podium-block">
      <div class="podium-car" id="pod-car-3">—</div>
      <div class="podium-label" id="pod-label-3" style="color:var(--bronze);">🥉</div>
      <div class="podium-pedestal ped-3">3</div>
    </div>
  </div>
  <div class="podium-rest" id="podiumRest"></div>
</div>

<script>
  let eventId, event, ctx;

  (async () => {
    try {
      ({ ctx, event, eventId } = await initPage());
    } catch (e) { return; }

    document.title        = event.name + ' — Live';
    document.getElementById('hdrTitle').textContent    = event.track_name || event.name;
    const _expiry = new Date(new Date(event.created_at).getTime() + 60 * 24 * 60 * 60 * 1000);
    document.getElementById('hdrSubtitle').textContent = 'Expires ' + _expiry.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

    await refresh();

    sb.channel('display-' + eventId)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'race_state' },   refresh)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'heat_results' }, refresh)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'heat_entries' }, refresh)
      .subscribe();

    sb.channel('podium-control-' + eventId)
      .on('broadcast', { event: 'podium' }, ({ payload }) => {
        if (!payload || payload.mode !== 'podium') return;
        handlePodium(payload);
      })
      .subscribe();

    setInterval(refresh, 8000);
  })();

  async function refresh() {
    const { data: state } = await sb
      .from('race_state')
      .select('current_round_id, current_heat_id, heats(heat_number, rounds(round_number))')
      .eq('event_id', eventId)
      .single();

    updateHeatInfo(state);
    await Promise.all([
      updateLanes(state?.current_heat_id ?? null),
      updateLeaderboard(state?.current_round_id ?? null)
    ]);
  }

  function updateHeatInfo(state) {
    const heat  = state?.heats;
    const round = heat?.rounds;
    const el    = document.getElementById('heatInfoText');
    el.textContent = (heat && round)
      ? `Round ${round.round_number} — Heat ${heat.heat_number}`
      : 'No active heat';
  }

  async function updateLanes(heatId) {
    const el = document.getElementById('laneRows');
    if (!heatId) {
      el.innerHTML = `<div class="idle-state"><div class="idle-icon">⏳</div><p>Waiting to start</p></div>`;
      return;
    }
    const { data: entries } = await sb
      .from('heat_entries')
      .select('lane_number, cars(car_number, kid_name)')
      .eq('heat_id', heatId)
      .order('lane_number');
    if (!entries?.length) { el.innerHTML = `<div class="idle-state"><p>No lane data</p></div>`; return; }
    const stripes = ['s1','s2','s3','s4'];
    el.innerHTML = entries.map((e, i) => `
      <div class="lane-row">
        <div class="lane-stripe ${stripes[i] || ''}"></div>
        <div class="lane-inner">
          <div class="ln-badge">Lane ${e.lane_number}</div>
          <div class="ln-name">${e.cars?.kid_name ?? '—'}</div>
          <div class="ln-num">Car #${e.cars?.car_number ?? '—'}</div>
        </div>
      </div>`).join('');
  }

  async function updateLeaderboard(roundId) {
    const el = document.getElementById('boardRows');
    if (!roundId) {
      el.innerHTML = `<div class="idle-state"><div class="idle-icon">🏆</div><p>No results yet</p></div>`;
      return;
    }
    const { data: results } = await sb
      .from('heat_results')
      .select('first_place_car, second_place_car, third_place_car, fourth_place_car, heats!inner(round_id)')
      .eq('heats.round_id', roundId);
    const { data: activeCars } = await sb
      .from('cars').select('id, car_number, kid_name')
      .eq('eliminated', false).eq('event_id', eventId);
    if (!activeCars?.length) { el.innerHTML = `<div class="idle-state"><p>No active cars</p></div>`; return; }
    const pts = {};
    activeCars.forEach(c => pts[c.id] = 0);
    (results || []).forEach(r => {
      if (pts[r.first_place_car]  !== undefined) pts[r.first_place_car]  += 1;
      if (pts[r.second_place_car] !== undefined) pts[r.second_place_car] += 2;
      if (pts[r.third_place_car]  !== undefined) pts[r.third_place_car]  += 3;
      if (pts[r.fourth_place_car] !== undefined) pts[r.fourth_place_car] += 4;
    });
    const sorted = activeCars
      .map(c => ({ ...c, points: pts[c.id] ?? 0 }))
      .filter(c => c.points > 0)
      .sort((a, b) => a.points - b.points || a.car_number - b.car_number)
      .slice(0, 6);
    if (!sorted.length) { el.innerHTML = `<div class="idle-state"><div class="idle-icon">🏆</div><p>No results yet</p></div>`; return; }
    const rankLabel = ['1st','2nd','3rd','4th','5th','6th'];
    el.innerHTML = sorted.map((car, i) => `
      <div class="board-row pos-${i + 1}">
        <div class="bd-rank">${rankLabel[i] ?? i + 1}</div>
        <div class="bd-carnum">#${car.car_number}</div>
        <div class="bd-name">${car.kid_name}</div>
        <div class="bd-pts">${car.points} pts</div>
      </div>`).join('');
  }

  function handlePodium(data) {
    const overlay = document.getElementById('podiumOverlay');
    overlay.classList.add('active');
    const cars = data.cars; const step = data.step;
    const rest = cars.filter(c => c.rank > 3);
    if (rest.length) {
      document.getElementById('podiumRest').innerHTML =
        rest.map(c => `<span style="margin:0 12px;">${c.rank}th — #${c.car_number} ${c.kid_name}</span>`).join('');
    }
    for (let i = 1; i <= 3; i++) {
      document.getElementById('pod-label-' + i).classList.remove('revealed');
      document.getElementById('pod-car-' + i).classList.remove('revealed');
    }
    const c1 = cars.find(c => c.rank === 1), c2 = cars.find(c => c.rank === 2), c3 = cars.find(c => c.rank === 3);
    if (c1) document.getElementById('pod-car-1').textContent = `#${c1.car_number} ${c1.kid_name}`;
    if (c2) document.getElementById('pod-car-2').textContent = `#${c2.car_number} ${c2.kid_name}`;
    if (c3) document.getElementById('pod-car-3').textContent = `#${c3.car_number} ${c3.kid_name}`;
    if (step >= 0) { document.getElementById('pod-label-3').classList.add('revealed'); document.getElementById('pod-car-3').classList.add('revealed'); }
    if (step >= 1) { document.getElementById('pod-label-2').classList.add('revealed'); document.getElementById('pod-car-2').classList.add('revealed'); }
    if (step >= 2) { document.getElementById('pod-label-1').classList.add('revealed'); document.getElementById('pod-car-1').classList.add('revealed'); }
  }
</script>
</body>
</html>
