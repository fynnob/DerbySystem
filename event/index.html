<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Derby Registration</title>
  <link rel="stylesheet" href="/DerbySystem/styles.css" />
</head>
<body>

<nav class="top-nav">
  <span class="brand">Pinewood Derby</span>
  <button class="btn btn-primary btn-sm" id="showQrBtn" onclick="showDeviceQR()" style="display:none; margin-left:auto;">📱 My QR</button>
</nav>

<div class="container" style="padding-top:20px;">

  <!-- Registration form -->
  <div class="card">
    <div class="card-title">Register a Car</div>
    <p id="expiryNotice" style="display:none; font-size:0.82rem; margin-bottom:12px; padding:8px 10px; border-radius:8px; background:var(--accent-bg); color:var(--accent); font-weight:600;"></p>

    <label for="kidName">Racer's Name</label>
    <input type="text" id="kidName" placeholder="e.g. Alex Johnson" maxlength="80"
           autocomplete="off" autocapitalize="words" />

    <button class="btn btn-gold btn-lg btn-full" id="registerBtn">
      ➕ Register Car
    </button>
  </div>

  <!-- Registered cars for this device -->
  <div class="card">
    <div class="card-title">Your Registered Cars</div>
    <div id="carList">
      <div class="empty-state">No cars registered from this device yet.</div>
    </div>
  </div>

  <!-- Race Status for this device's cars -->
  <div class="card" id="raceStatusCard" style="display:none;">
    <div class="card-title">Live Race Status</div>
    <div id="raceStatusBody"><span class="spinner"></span></div>
  </div>

</div>

<!-- Edit car modal -->
<div class="modal-overlay" id="editModal" onclick="closeEditModal(event)">
  <div class="modal-sheet">
    <div style="font-size:0.75rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px;">Edit Car</div>
    <label for="editKidName">Racer's Name</label>
    <input type="text" id="editKidName" placeholder="Racer's name" maxlength="80" autocapitalize="words" />
    <button class="btn btn-gold btn-full" id="editSaveBtn" onclick="saveCarEdit()">Save Changes</button>
    <button class="btn btn-ghost btn-full" style="margin-top:8px;" onclick="closeEditModal()">Cancel</button>
  </div>
</div>

<!-- Delete car confirm -->
<div class="confirm-overlay" id="delCarOverlay" style="display:none;">
  <div class="confirm-box">
    <p style="margin-bottom:20px; font-weight:600;">Delete this car? This cannot be undone.</p>
    <div style="display:flex; gap:12px;">
      <button class="btn btn-ghost btn-full" onclick="closeDelModal()">Cancel</button>
      <button class="btn btn-danger btn-full" onclick="confirmCarDelete()">Delete</button>
    </div>
  </div>
</div>


<!-- Full-screen QR modal (bottom sheet on mobile) -->
<div class="modal-overlay" id="qrModal" onclick="closeQR(event)">
  <div class="modal-sheet">
    <div style="font-size:0.75rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px;">Your Check-in QR</div>
    <div style="display:flex; justify-content:center; margin-bottom:16px;">
      <div class="qr-block" id="qrCanvas"></div>
    </div>
    <p style="font-size:0.85rem; margin-bottom:12px;">
      Show this at inspection — it covers all your cars.
    </p>
    <p style="font-size:1.2rem; font-weight:900; letter-spacing:6px; color:var(--accent); margin-bottom:20px;" id="qrShortCode"></p>
    <button class="btn btn-ghost btn-full" onclick="closeQR()">Close</button>
  </div>
</div>

<div id="toast"></div>

<!-- Dependencies -->
<script src="/DerbySystem/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="/DerbySystem/lib/router.js"></script>
<script src="/DerbySystem/lib/api.js"></script>
<script>
  // ── Multi-tenant boot ─────────────────────────────────────────
  // sb is provided globally by api.js once initPage() resolves.
  // eventId scopes all queries and the realtime channel to this event.
  let eventId = null;
  let STORE_KEY = 'derby_my_cars';   // overwritten after boot with eventId
  const TOKEN_KEY = 'derby_device_token';

  (async () => {
    try {
      const result = await initPage();
      eventId   = result.eventId;
      STORE_KEY = 'derby_my_cars_' + eventId;

      // Show event expiry notice
      const _exp      = new Date(new Date(result.event.created_at).getTime() + 60 * 24 * 60 * 60 * 1000);
      const _expStr   = _exp.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
      const _daysLeft = Math.ceil((_exp - Date.now()) / (1000 * 60 * 60 * 24));
      const _notice   = document.getElementById('expiryNotice');
      if (_notice) {
        _notice.textContent = _daysLeft <= 14
          ? `⚠ This event expires ${_expStr} (${_daysLeft} day${_daysLeft !== 1 ? 's' : ''} left) — register soon!`
          : `Event active until ${_expStr}`;
        _notice.style.display = '';
        if (_daysLeft <= 14) _notice.style.background = 'var(--danger-bg)';
        if (_daysLeft <= 14) _notice.style.color = 'var(--danger)';
      }
    } catch {
      return; // die() already displayed the error
    }

    getDeviceToken();
    renderCarList();
    renderDeviceQR();
    loadRaceStatus();

    // Realtime — scoped to this event so multiple events don't cross-contaminate
    sb.channel('parent-cars-' + eventId)
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'cars' }, payload => {
        const car = payload.new;
        const badge = document.getElementById('badge_' + car.id);
        if (!badge) return;
        badge.className   = `badge badge-${car.legal_status}`;
        badge.textContent = statusLabel(car.legal_status);
        const list = getMyCars().map(c => c.id === car.id ? { ...c, legal_status: car.legal_status } : c);
        localStorage.setItem(STORE_KEY, JSON.stringify(list));
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'race_state' },   () => loadRaceStatus())
      .on('postgres_changes', { event: '*', schema: 'public', table: 'heat_results' }, () => loadRaceStatus())
      .subscribe();
  })();

  // ── Device token (one per browser / device) ───────────────────
  function getDeviceToken() {
    let t = localStorage.getItem(TOKEN_KEY);
    if (!t) {
      t = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2);
      localStorage.setItem(TOKEN_KEY, t);
    }
    return t;
  }

  // ── Toast ─────────────────────────────────────────────────────
  function toast(msg, ok = true) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = ok ? 'show ok' : 'show err';
    clearTimeout(el._t);
    el._t = setTimeout(() => el.className = '', 3000);
  }

  // ── localStorage helpers ──────────────────────────────────────
  function getMyCars() { return JSON.parse(localStorage.getItem(STORE_KEY) || '[]'); }
  function saveMyCar(car) {
    const list = getMyCars(); list.push(car);
    localStorage.setItem(STORE_KEY, JSON.stringify(list));
  }

  // ── Image preview ─────────────────────────────────────────────
  // (Photos disabled — no image upload)

  // ── Register ──────────────────────────────────────────────────
  document.getElementById('registerBtn').addEventListener('click', async () => {
    const kidName     = document.getElementById('kidName').value.trim();
    const deviceToken = getDeviceToken();

    if (!kidName) { toast("Enter the racer's name first.", false); return; }
    if (!eventId) { toast('Still loading — please wait a moment.', false); return; }

    const btn = document.getElementById('registerBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Registering…';

    try {
      // event_id scopes this car to the current event
      const { data: car, error: carErr } = await sb
        .from('cars')
        .insert({ kid_name: kidName, device_token: deviceToken, event_id: eventId })
        .select()
        .single();

      if (carErr) throw carErr;

      saveMyCar(car);
      renderCarList();
      renderDeviceQR();

      document.getElementById('kidName').value = '';

      toast(`Car #${car.car_number} registered! 🏁`);
    } catch (err) {
      console.error(err);
      toast('Registration failed — ' + err.message, false);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '➕ Register Car';
    }
  });

  // ── Device QR (covers all cars from this device) ──────────────
  function renderDeviceQR() {
    const list = getMyCars();
    if (!list.length) return;
    document.getElementById('showQrBtn').style.display = 'inline-flex';
  }

  function showDeviceQR() {
    const token = getDeviceToken();
    const shortCode = tokenToShortCode(token);
    const canvas = document.getElementById('qrCanvas');
    canvas.innerHTML = '';
    new QRCode(canvas, {
      text:         token,
      width:        256, height: 256,
      colorDark:    '#000', colorLight: '#fff',
      correctLevel: QRCode.CorrectLevel.H
    });
    document.getElementById('qrShortCode').textContent = shortCode;
    document.getElementById('qrModal').classList.add('open');
  }

  function closeQR(e) {
    if (!e || e.target.id === 'qrModal' || e.target.tagName === 'BUTTON') {
      document.getElementById('qrModal').classList.remove('open');
    }
  }

  // ── Car list ──────────────────────────────────────────────────
  function statusLabel(s) {
    return s === 'legal' ? '✅ Legal' : s === 'not_legal' ? '❌ Not Legal' : '⏳ Pending';
  }

  function renderCarList() {
    const list = getMyCars();
    const el   = document.getElementById('carList');

    if (!list.length) {
      el.innerHTML = '<div class="empty-state">No cars registered from this device yet.</div>';
      return;
    }

    el.innerHTML = list.map(car => `
      <div class="car-list-item">
        <div class="info">
          <div class="num">#${car.car_number}</div>
          <div class="name">${car.kid_name}</div>
          <div style="margin-top:4px;">
            <span class="badge badge-${car.legal_status}" id="badge_${car.id}">${statusLabel(car.legal_status)}</span>
          </div>
          <div style="display:flex; gap:8px; margin-top:10px;">
            <button class="btn btn-sm" style="background:var(--accent2); color:#fff;" onclick="openCarEdit('${car.id}')">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="openDelModal('${car.id}')">Delete</button>
          </div>
        </div>
      </div>
    `).join('');

    refreshStatuses(list.map(c => c.id));
  }

  async function refreshStatuses(ids) {
    const { data } = await sb.from('cars').select('id,legal_status').in('id', ids);
    if (!data) return;
    const map = {};
    data.forEach(r => map[r.id] = r.legal_status);
    const list = getMyCars().map(c => ({ ...c, legal_status: map[c.id] || c.legal_status }));
    localStorage.setItem(STORE_KEY, JSON.stringify(list));
    list.forEach(car => {
      const b = document.getElementById('badge_' + car.id);
      if (b) { b.className = `badge badge-${car.legal_status}`; b.textContent = statusLabel(car.legal_status); }
    });
  }

  // ── Edit car ──────────────────────────────────────────────────
  let _editCarId = null;

  function openCarEdit(carId) {
    _editCarId = carId;
    const car = getMyCars().find(c => c.id === carId);
    if (!car) return;
    document.getElementById('editKidName').value = car.kid_name;
    document.getElementById('editModal').classList.add('open');
  }

  function closeEditModal(e) {
    if (!e || e.target.id === 'editModal' || e.target.tagName === 'BUTTON') {
      document.getElementById('editModal').classList.remove('open');
    }
  }

  async function saveCarEdit() {
    const newName = document.getElementById('editKidName').value.trim();
    if (!newName) { toast('Name cannot be empty.', false); return; }

    const btn = document.getElementById('editSaveBtn');
    btn.disabled = true; btn.textContent = 'Saving…';

    try {
      const { error } = await sb.from('cars').update({ kid_name: newName }).eq('id', _editCarId);
      if (error) throw error;

      const list = getMyCars().map(c => c.id === _editCarId ? { ...c, kid_name: newName } : c);
      localStorage.setItem(STORE_KEY, JSON.stringify(list));
      renderCarList();
      document.getElementById('editModal').classList.remove('open');
      toast('Car updated!');
    } catch (err) {
      toast('Update failed — ' + err.message, false);
    } finally {
      btn.disabled = false; btn.textContent = 'Save Changes';
    }
  }

  // ── Delete car ────────────────────────────────────────────────
  let _deleteCarId = null;

  function openDelModal(carId) {
    _deleteCarId = carId;
    document.getElementById('delCarOverlay').style.display = 'flex';
  }

  function closeDelModal() {
    document.getElementById('delCarOverlay').style.display = 'none';
    _deleteCarId = null;
  }

  async function confirmCarDelete() {
    if (!_deleteCarId) return;
    const btn = document.querySelector('#delCarOverlay button[onclick="confirmCarDelete()"]');
    if (btn) { btn.disabled = true; btn.textContent = 'Deleting…'; }
    try {
      const { error } = await sb.from('cars').delete().eq('id', _deleteCarId);
      if (error) throw error;
      const list = getMyCars().filter(c => c.id !== _deleteCarId);
      localStorage.setItem(STORE_KEY, JSON.stringify(list));
      renderCarList();
      renderDeviceQR();
      document.getElementById('delCarOverlay').style.display = 'none';
      _deleteCarId = null;
      toast('Car deleted.');
    } catch (err) {
      toast('Delete failed — ' + err.message, false);
      if (btn) { btn.disabled = false; btn.textContent = 'Delete'; }
    }
  }

  // ── Race Status ───────────────────────────────────────────────
  async function loadRaceStatus() {
    const myCars = getMyCars();
    const card   = document.getElementById('raceStatusCard');
    if (!myCars.length) { card.style.display = 'none'; return; }
    card.style.display = 'block';
    const el = document.getElementById('raceStatusBody');

    const { data: state } = await sb.from('race_state')
      .select('current_round_id, current_heat_id').eq('event_id', eventId).single();

    if (!state?.current_round_id) {
      el.innerHTML = "<div class=\"empty-state\">Racing hasn't started yet — check back soon!</div>";
      return;
    }

    const { data: heats } = await sb.from('heats')
      .select('id, heat_number, status')
      .eq('round_id', state.current_round_id)
      .order('heat_number');

    const currentIdx = (heats || []).findIndex(h => h.id === state.current_heat_id);

    const upcomingIds = (heats || []).filter(h => h.status !== 'completed').map(h => h.id);
    const { data: futureEntries } = upcomingIds.length
      ? await sb.from('heat_entries').select('heat_id, car_id').in('heat_id', upcomingIds)
      : { data: [] };

    const myIdSet = new Set(myCars.map(c => c.id));
    const heatAwayFor = {};
    (futureEntries || []).forEach(e => {
      if (!myIdSet.has(e.car_id)) return;
      const hIdx = heats.findIndex(h => h.id === e.heat_id);
      if (hIdx === -1) return;
      const away = hIdx - currentIdx;
      if (heatAwayFor[e.car_id] === undefined || away < heatAwayFor[e.car_id])
        heatAwayFor[e.car_id] = away;
    });

    const [{ data: results }, { data: allActive }, { data: myCarData }] = await Promise.all([
      sb.from('heat_results')
        .select('first_place_car, second_place_car, third_place_car, fourth_place_car, heats!inner(round_id)')
        .eq('heats.round_id', state.current_round_id),
      sb.from('cars').select('id').eq('eliminated', false).eq('event_id', eventId),
      sb.from('cars').select('id, eliminated').in('id', myCars.map(c => c.id))
    ]);

    const eliminatedSet = new Set((myCarData || []).filter(c => c.eliminated).map(c => c.id));

    const pts = {};
    (allActive || []).forEach(c => pts[c.id] = 0);
    (results || []).forEach(r => {
      if (pts[r.first_place_car]  !== undefined) pts[r.first_place_car]  += 1;
      if (pts[r.second_place_car] !== undefined) pts[r.second_place_car] += 2;
      if (pts[r.third_place_car]  !== undefined) pts[r.third_place_car]  += 3;
      if (pts[r.fourth_place_car] !== undefined) pts[r.fourth_place_car] += 4;
    });

    const sorted = Object.entries(pts)
      .filter(([, p]) => p > 0)
      .sort((a, b) => a[1] - b[1]);
    const rankOf = {};
    sorted.forEach(([id], i) => rankOf[id] = i + 1);
    const totalRanked = sorted.length;

    el.innerHTML = myCars.map(car => {
      if (eliminatedSet.has(car.id)) {
        return `
          <div style="display:flex; align-items:center; gap:14px; padding:13px 0; border-bottom:1px solid var(--border); opacity:0.55;">
            <div style="font-size:2rem; font-weight:900; color:var(--muted2); min-width:40px; text-align:center; text-decoration:line-through;">#${car.car_number}</div>
            <div style="flex:1;">
              <div style="font-weight:700; color:var(--muted2); text-decoration:line-through;">${car.kid_name}</div>
              <div style="font-size:0.82rem; color:#dc2626; font-weight:700; margin-top:3px;">Eliminated — thanks for racing!</div>
            </div>
            <span class="badge" style="background:var(--danger); color:#fff; white-space:nowrap;">OUT</span>
          </div>`;
      }

      const away = heatAwayFor[car.id];
      let heatLine;
      if (away === undefined)    heatLine = 'Done for this round';
      else if (away === 0)       heatLine = '<strong style="color:var(--accent);">Racing NOW!</strong>';
      else                       heatLine = `Races in <strong>${away}</strong> heat${away !== 1 ? 's' : ''}`;

      const rank = rankOf[car.id];
      const rankLine = rank
        ? `<span style="font-weight:800; color:var(--accent2);">#${rank}</span><span style="font-size:0.8rem; color:var(--muted2);"> of ${totalRanked}</span>`
        : '<span style="color:var(--muted2); font-size:0.85rem;">Not yet ranked</span>';

      return `
        <div style="display:flex; align-items:center; gap:14px; padding:13px 0; border-bottom:1px solid var(--border);">
          <div style="font-size:2rem; font-weight:900; color:var(--accent); min-width:40px; text-align:center;">#${car.car_number}</div>
          <div style="flex:1;">
            <div style="font-weight:700;">${car.kid_name}</div>
            <div style="font-size:0.85rem; color:var(--muted2); margin-top:3px;">${heatLine}</div>
          </div>
          <div style="text-align:right;">${rankLine}</div>
        </div>`;
    }).join('');
  }


</script>
</body>
</html>
