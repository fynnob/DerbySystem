<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Hub — DerbySystem</title>
  <link rel="stylesheet" href="/DerbySystem/styles.css" />
  <script src="/DerbySystem/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/DerbySystem/lib/router.js"></script>
  <script src="/DerbySystem/lib/api.js"></script>
  <script src="/DerbySystem/lib/admin.js"></script>
</head>
<body>

<!-- PIN gate -->
<div id="pinGate" style="position:fixed;inset:0;z-index:9999;background:var(--bg);display:none;align-items:center;justify-content:center;">
  <div style="text-align:center;max-width:300px;padding:20px;">
    <h2 style="margin-bottom:8px;">Admin Access</h2>
    <p style="margin-bottom:16px;">Enter the 4-digit PIN</p>
    <input type="tel" id="pinInput" maxlength="4" placeholder="••••" autocomplete="off"
           style="text-align:center;font-size:2rem;letter-spacing:12px;width:160px;margin:0 auto 16px;display:block;" />
    <p id="pinErr" style="color:var(--danger);font-size:0.82rem;min-height:1.4em;"></p>
  </div>
</div>

<nav class="top-nav">
  <span class="brand" id="navBrand">Derby</span>
  <span id="navLinks"></span>
</nav>

<div class="container">
  <div class="page-header" style="margin-top:24px;">
    <div class="title-block">
      <h1>Race Control</h1>
      <p id="eventSubtitle">Loading…</p>
    </div>
  </div>

  <!-- Status strip -->
  <div class="card" id="statusCard">
    <div class="card-title">Event Status</div>
    <div class="status-bar" id="statusBody"><span class="spinner"></span></div>
  </div>

  <!-- Station cards -->
  <div class="station-grid" id="stationGrid">
    <!-- populated in JS so hrefs can include hash context -->
  </div>

</div>

<div id="toast"></div>

<script>
  let ctx, event, eventId;

  (async () => {
    ({ ctx, event, eventId } = await adminBoot());

    document.title = `Admin — ${event.name}`;
    document.getElementById("navBrand").textContent = "🏁 " + (event.track_name || "Derby");
    document.getElementById("navLinks").innerHTML   = buildAdminNav(ctx, "index");
    const _expiry = new Date(new Date(event.created_at).getTime() + 60 * 24 * 60 * 60 * 1000);
    document.getElementById("eventSubtitle").textContent = `${event.name} · Expires ${_expiry.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`;

    // Build station grid with hash context
    const hash = `#/${ctx.orgType}/${ctx.orgNumber}/${ctx.eventSeq}`;
    document.getElementById("stationGrid").innerHTML = [
      { href: `/DerbySystem/admin/inspection.html${hash}`, icon: "🔍", title: "Inspection",   desc: "Scan QR, approve / reject cars" },
      { href: `/DerbySystem/admin/track.html${hash}`,      icon: "🛤️", title: "Track",        desc: "Browse lane assignments for each heat" },
      { href: `/DerbySystem/admin/results.html${hash}`,    icon: "🏁", title: "Race Officials",desc: "Heat control, results entry, round management" },
      { href: `/DerbySystem/admin/cars.html${hash}`,       icon: "🚗", title: "Cars",          desc: "View and edit all registered cars" },
      { href: `/DerbySystem/admin/announcer.html${hash}`,  icon: "📺", title: "Screen",        desc: "Control the announcer display" },
      { href: `/DerbySystem/display/index.html${hash}`,    icon: "🖥️", title: "Display",       desc: "Open the race day display board" },
    ].map(s => `
      <a href="${s.href}" class="station-card">
        <span class="icon">${s.icon}</span>
        <h3>${s.title}</h3>
        <p>${s.desc}</p>
      </a>`).join("");

    await loadStatus();

    // Live updates
    subscribeTable(eventId, "race_state",   loadStatus);
    subscribeTable(eventId, "heats",        loadStatus);
    subscribeTable(eventId, "heat_results", loadStatus);
  })();

  async function loadStatus() {
    const { data: cars }  = await sb.from("cars").select("id, legal_status").eq("event_id", eventId);
    const { data: rounds} = await sb.from("rounds").select("id, status").eq("event_id", eventId);
    const { data: state } = await sb.from("race_state").select("*").eq("event_id", eventId).single();

    const total   = cars?.length ?? 0;
    const legal   = cars?.filter(c => c.legal_status === "legal").length   ?? 0;
    const illegal = cars?.filter(c => c.legal_status === "not_legal").length ?? 0;
    const activeRound = rounds?.find(r => r.status === "active");

    document.getElementById("statusBody").innerHTML = `
      <div class="stat-item"><div class="stat-label">Cars</div><div class="stat-val">${total}</div></div>
      <div class="stat-item"><div class="stat-label">Legal</div><div class="stat-val" style="color:var(--success)">${legal}</div></div>
      <div class="stat-item"><div class="stat-label">Illegal</div><div class="stat-val" style="color:var(--danger)">${illegal}</div></div>
      <div class="stat-item"><div class="stat-label">Round</div><div class="stat-val" style="color:var(--accent2)">${activeRound ? rounds.indexOf(activeRound) + 1 : "—"}</div></div>`;
  }

</script>

</body>
</html>
