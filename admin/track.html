<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track — DerbySystem</title>
  <link rel="stylesheet" href="/DerbySystem/styles.css" />
  <script src="/DerbySystem/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/DerbySystem/lib/router.js"></script>
  <script src="/DerbySystem/lib/api.js"></script>
  <script src="/DerbySystem/lib/admin.js"></script>
</head>
<body>

<div id="pinGate" style="position:fixed;inset:0;z-index:9999;background:var(--bg);display:none;align-items:center;justify-content:center;">
  <div style="text-align:center;max-width:300px;padding:20px;">
    <h2 style="margin-bottom:8px;">Admin Access</h2>
    <p style="margin-bottom:16px;">Enter the 4-digit PIN</p>
    <input type="tel" id="pinInput" maxlength="4" placeholder="••••" autocomplete="off"
           style="text-align:center;font-size:2rem;letter-spacing:12px;width:160px;margin:0 auto 16px;display:block;" />
    <p id="pinErr" style="color:var(--danger);font-size:0.82rem;min-height:1.4em;"></p>
  </div>
</div>

<nav class="top-nav">
  <span class="brand" id="navBrand">Derby</span>
  <span id="navLinks"></span>
</nav>

<div class="container">
  <!-- Heat navigation -->
  <div class="heat-nav" style="margin-top:20px;">
    <button class="btn btn-ghost" id="prevBtn" onclick="browse(-1)" style="min-width:56px;">◀</button>
    <div class="heat-nav-label" id="heatNavLabel">Loading…</div>
    <button class="btn btn-ghost" id="nextBtn" onclick="browse(1)" style="min-width:56px;">▶</button>
  </div>

  <!-- Lane board -->
  <div class="lane-board" id="laneBoard"></div>

  <div class="card" style="margin-top:4px; text-align:center;">
    <button class="btn btn-ghost-danger" onclick="openRerace()">⚠ Re-race Current Heat</button>
  </div>
</div>

<!-- Re-race confirm -->
<div class="confirm-overlay" id="reraceOverlay">
  <div class="confirm-box" style="max-width:380px; width:100%; text-align:center;">
    <div style="font-size:2.2rem; font-weight:900; color:var(--danger); letter-spacing:2px; margin-bottom:8px;">⚠ RE-RACE</div>
    <div id="reraceLabel" style="font-size:1.4rem; font-weight:800; margin-bottom:12px;"></div>
    <p style="font-size:0.9rem; color:var(--muted2); margin-bottom:20px;">Results will be cleared and the heat reset for re-running.</p>
    <div class="confirm-btns">
      <button class="btn btn-ghost btn-full" onclick="closeRerace()">Cancel</button>
      <button class="btn btn-danger btn-full" onclick="confirmRerace()">⚠ Confirm</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  let ctx, event, eventId;
  let allHeats   = [];     // [{id, heat_number, round_number, status}]
  let viewIndex  = 0;
  let currentHeatId = null;

  (async () => {
    ({ ctx, event, eventId } = await adminBoot());

    document.title = `Track — ${event.name}`;
    document.getElementById("navBrand").textContent = "🏁 " + (event.track_name || "Derby");
    document.getElementById("navLinks").innerHTML   = buildAdminNav(ctx, "track");

    await init();

    subscribeTable(eventId, "race_state", async () => {
      await init();
    });
    subscribeTable(eventId, "heat_entries", () => showHeat(viewIndex));
  })();

  async function init() {
    const { data: state } = await sb
      .from("race_state")
      .select("current_round_id, current_heat_id")
      .eq("event_id", eventId)
      .single();

    if (!state?.current_round_id) {
      document.getElementById("heatNavLabel").textContent = "No active round";
      renderEmptyBoard();
      return;
    }

    currentHeatId = state.current_heat_id;

    const { data: heats } = await sb
      .from("heats")
      .select("id, heat_number, status, rounds(round_number)")
      .eq("round_id", state.current_round_id)
      .order("heat_number");

    if (!heats?.length) {
      document.getElementById("heatNavLabel").textContent = "No heats yet";
      renderEmptyBoard();
      return;
    }

    allHeats = heats.map(h => ({
      id: h.id,
      heat_number: h.heat_number,
      round_number: h.rounds?.round_number ?? "?",
      status: h.status,
    }));

    const currentIdx = allHeats.findIndex(h => h.id === currentHeatId);
    viewIndex = currentIdx >= 0 ? currentIdx : 0;
    showHeat(viewIndex);
  }

  function browse(delta) {
    const next = viewIndex + delta;
    if (next < 0 || next >= allHeats.length) return;
    viewIndex = next;
    showHeat(viewIndex);
  }

  async function showHeat(idx) {
    if (!allHeats.length) return;
    const h = allHeats[idx];
    const numL = event.num_lanes || 4;

    const heatState = h.id === currentHeatId ? "current"
                    : h.status === "completed" ? "past"
                    : "future";

    const label = document.getElementById("heatNavLabel");
    label.textContent = `Round ${h.round_number} — Heat ${h.heat_number} (${idx + 1}/${allHeats.length})`;
    label.className = "heat-nav-label state-" + heatState;

    document.getElementById("laneBoard").className = "lane-board state-" + heatState;
    document.getElementById("prevBtn").disabled = idx === 0;
    document.getElementById("nextBtn").disabled = idx === allHeats.length - 1;

    const { data: entries } = await sb
      .from("heat_entries")
      .select("lane_number, cars(car_number, kid_name)")
      .eq("heat_id", h.id)
      .order("lane_number");

    const lanes = {};
    (entries || []).forEach(e => lanes[e.lane_number] = e.cars);

    document.getElementById("laneBoard").innerHTML =
      Array.from({ length: numL }, (_, i) => i + 1).map(l => {
        const car = lanes[l];
        return `
          <div class="lane-card">
            <div class="lane-label">Lane ${l}</div>
            <div class="car-number">${car ? car.car_number : "—"}</div>
            <div class="kid-name">${car ? car.kid_name : ""}</div>
          </div>`;
      }).join("");
  }

  function renderEmptyBoard() {
    const numL = event?.num_lanes || 4;
    document.getElementById("laneBoard").innerHTML =
      Array.from({ length: numL }, (_, i) => i + 1).map(l => `
        <div class="lane-card">
          <div class="lane-label">Lane ${l}</div>
          <div class="car-number">—</div>
        </div>`).join("");
  }

  // Re-race
  function openRerace() {
    if (!currentHeatId) { toast("No active heat", false); return; }
    const h = allHeats.find(h => h.id === currentHeatId);
    if (h) document.getElementById("reraceLabel").textContent =
      `Round ${h.round_number} — Heat ${h.heat_number}`;
    document.getElementById("reraceOverlay").classList.add("open");
  }

  function closeRerace() {
    document.getElementById("reraceOverlay").classList.remove("open");
  }

  async function confirmRerace() {
    if (!currentHeatId) return;
    const h = allHeats.find(x => x.id === currentHeatId);
    await sb.from("heat_results").delete().eq("heat_id", currentHeatId);
    await sb.from("heats").update({ status: "active" }).eq("id", currentHeatId);
    sb.channel('rerace-control-' + eventId).send({
      type: 'broadcast', event: 'rerace',
      payload: { round: h?.round_number, heat: h?.heat_number }
    });
    closeRerace();
    toast("Heat reset — re-run when ready");
    await init();
  }
</script>

</body>
</html>
