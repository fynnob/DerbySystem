<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inspection — DerbySystem</title>
  <link rel="stylesheet" href="/DerbySystem/styles.css" />
  <style>
    body { background: #000; overflow: hidden; }
    .kiosk-root { position: fixed; inset: 0; display: flex; flex-direction: column; }
    .scan-area  { flex: 1; position: relative; overflow: hidden; }
    #reader { width: 100%; height: 100%; }
    #reader video { width: 100% !important; height: 100% !important; object-fit: cover !important; }

    .tally-pill {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.75); backdrop-filter: blur(8px);
      color: #fff; padding: 6px 18px; border-radius: 100px;
      font-size: 0.78rem; font-weight: 700; display: flex; gap: 14px; z-index: 50;
    }
    .tally-pill .t-g { color: #4ade80; }
    .tally-pill .t-r { color: #f87171; }
    .tally-pill .t-y { color: #fbbf24; }

    .nav-pill {
      position: fixed; bottom: 14px; right: 14px;
      background: rgba(0,0,0,.7); backdrop-filter: blur(8px);
      color: #fff; padding: 10px 18px; border-radius: 100px;
      font-size: 0.82rem; font-weight: 700; z-index: 50;
      text-decoration: none; letter-spacing: 0.5px;
    }

    .family-overlay { position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:200; display:none; align-items:flex-end; justify-content:center; }
    .family-overlay.open { display:flex; }
    .family-sheet { background:var(--surface); border-radius:20px 20px 0 0; width:100%; max-width:640px; max-height:80vh; overflow-y:auto; padding:20px 20px 32px; color:var(--text); }
    .sheet-handle { width:40px; height:4px; background:var(--border2); border-radius:4px; margin:0 auto 16px; }

    .fam-car { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 0; border-bottom:1px solid var(--border); }
    .fam-car:last-child { border-bottom:none; }
    .fam-info { display:flex; flex-direction:column; gap:4px; flex:1; }
    .fam-num  { font-size:1.4rem; font-weight:900; color:var(--accent); }
    .fam-name { font-size:1rem; font-weight:600; }
    .fam-actions { display:flex; gap:8px; flex-shrink:0; align-items:center; }

    .insp-toggle-btn {
      width:44px; height:44px; border-radius:50%;
      border:2px solid var(--border); background:transparent;
      font-size:1.2rem; font-weight:900; cursor:pointer;
      transition:all .15s; display:flex; align-items:center; justify-content:center;
    }
    .insp-toggle-btn.legal   { color:#4ade80; border-color:#4ade80; }
    .insp-toggle-btn.illegal { color:#f87171; border-color:#f87171; }
    .insp-toggle-btn.active.legal   { background:#4ade80; color:#000; }
    .insp-toggle-btn.active.illegal { background:#f87171; color:#fff; }
  </style>
  <script src="/DerbySystem/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/DerbySystem/lib/router.js"></script>
  <script src="/DerbySystem/lib/api.js"></script>
  <script src="/DerbySystem/lib/admin.js"></script>
</head>
<body>

<div id="pinGate" style="position:fixed;inset:0;z-index:9999;background:#000;display:none;align-items:center;justify-content:center;">
  <div style="text-align:center;max-width:300px;padding:20px;color:#fff;">
    <h2 style="margin-bottom:8px;">Admin Access</h2>
    <p style="margin-bottom:16px; color:#9ca3af;">Enter the 4-digit PIN</p>
    <input type="tel" id="pinInput" maxlength="4" placeholder="••••" autocomplete="off"
           style="text-align:center;font-size:2rem;letter-spacing:12px;width:160px;margin:0 auto 16px;display:block;background:#1a1e2e;border:1px solid #333;color:#fff;border-radius:10px;padding:12px;" />
    <p id="pinErr" style="color:#f87171;font-size:0.82rem;min-height:1.4em;"></p>
  </div>
</div>

<div class="kiosk-root">
  <!-- Floating tally -->
  <div class="tally-pill">
    <span><span class="t-g" id="tallyLegal">0</span> Legal</span>
    <span><span class="t-r" id="tallyIllegal">0</span> Not Legal</span>
    <span><span class="t-y" id="tallyPending">0</span> Pending</span>
  </div>

  <!-- Camera -->
  <div class="scan-area"><div id="reader"></div></div>

  <!-- Manual lookup -->
  <div style="position:fixed;bottom:14px;left:14px;z-index:50;display:flex;gap:8px;">
    <input type="text" id="tokenInput" placeholder="ABTC / #7 / name…"
           autocomplete="off" autocapitalize="characters"
           onkeydown="if(event.key==='Enter') manualLookup()"
           style="width:170px;margin:0;padding:8px 12px;font-size:0.82rem;border-radius:100px;background:rgba(0,0,0,.7);border:1px solid #444;color:#fff;backdrop-filter:blur(8px);" />
    <button onclick="manualLookup()" style="background:rgba(0,0,0,.7);backdrop-filter:blur(8px);color:#fff;border:1px solid #444;border-radius:100px;padding:8px 14px;font-size:0.82rem;font-weight:700;cursor:pointer;">Go</button>
  </div>

  <!-- Nav back -->
  <a id="navHub" href="#" class="nav-pill">← Hub</a>
</div>

<!-- Family overlay -->
<div class="family-overlay" id="familyOverlay">
  <div class="family-sheet" id="familySheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
      <div style="font-weight:800; font-size:1.1rem;" id="familyTitle">Family Cars</div>
      <button class="btn btn-ghost btn-sm" onclick="dismissFamily()">Done ✕</button>
    </div>
    <div id="carList"></div>
  </div>
</div>

<!-- Delete confirmation -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3>Delete Car?</h3>
    <p id="confirmMsg">This cannot be undone.</p>
    <div class="confirm-btns">
      <button class="btn btn-ghost btn-full" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger btn-full" id="confirmDeleteBtn">Delete</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
  let ctx, event, eventId;
  let lastToken        = null;
  let lastScanAt       = 0;
  const DEBOUNCE       = 3000;
  let _pendingDeleteId = null;

  (async () => {
    ({ ctx, event, eventId } = await adminBoot());

    // Fix nav link
    document.getElementById("navHub").href = `/DerbySystem/admin/index.html#/${ctx.orgType}/${ctx.orgNumber}/${ctx.eventSeq}`;

    await loadTally();
    startScanner();

    // Live tally via realtime
    sb.channel(`insp-cars-${eventId}`)
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'cars', filter: `event_id=eq.${eventId}` }, payload => {
        applyStatusUI(payload.new.id, payload.new.legal_status);
        loadTally();
      })
      .subscribe();
  })();

  async function loadTally() {
    const { data } = await sb.from("cars").select("legal_status").eq("event_id", eventId);
    const legal   = data?.filter(c => c.legal_status === "legal").length ?? 0;
    const illegal = data?.filter(c => c.legal_status === "not_legal").length ?? 0;
    const pending = data?.filter(c => c.legal_status === "pending").length ?? 0;
    document.getElementById("tallyLegal").textContent   = legal;
    document.getElementById("tallyIllegal").textContent = illegal;
    document.getElementById("tallyPending").textContent = pending;
  }

  function startScanner() {
    const scanner = new Html5Qrcode("reader");
    scanner.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 250, height: 250 } },
      (decoded) => {
        const now = Date.now();
        if (decoded === lastToken && now - lastScanAt < DEBOUNCE) return;
        lastToken  = decoded;
        lastScanAt = now;
        lookupToken(decoded);
      },
      () => {}
    ).catch(console.error);
  }

  async function lookupToken(token) {
    const { data: cars, error } = await sb
      .from("cars")
      .select("*")
      .eq("device_token", token)
      .eq("event_id", eventId);

    if (error || !cars?.length) {
      toast("No cars found for this QR code", false);
      return;
    }

    showFamily(cars, token);
  }

  async function manualLookup() {
    const raw = document.getElementById("tokenInput").value.trim().toUpperCase();
    if (!raw) return;

    // ── Short code: 4 uppercase letters (e.g. "ABTC") ──────────
    // Can't reverse-hash, so fetch all event cars, hash each unique
    // device_token, and find the one whose code matches.
    if (/^[A-Z]{4}$/.test(raw)) {
      const { data: allCars } = await sb
        .from("cars").select("*").eq("event_id", eventId);
      if (!allCars?.length) { toast("No cars registered yet", false); return; }

      // Group by device_token
      const byToken = {};
      for (const car of allCars) {
        if (!byToken[car.device_token]) byToken[car.device_token] = [];
        byToken[car.device_token].push(car);
      }

      // Find token whose short code matches
      const matchToken = Object.keys(byToken).find(
        t => tokenToShortCode(t) === raw
      );

      if (!matchToken) { toast(`No family found for code "${raw}"`, false); return; }
      showFamily(byToken[matchToken], matchToken);
      document.getElementById("tokenInput").value = "";
      return;
    }

    // ── Car number: pure integer ────────────────────────────────
    const asNum = parseInt(raw, 10);
    if (!isNaN(asNum) && String(asNum) === raw) {
      const { data: cars, error } = await sb
        .from("cars").select("*")
        .eq("event_id", eventId).eq("car_number", asNum);
      if (error || !cars?.length) { toast(`No car #${asNum} found`, false); return; }
      showFamily(cars, null);
      document.getElementById("tokenInput").value = "";
      return;
    }

    // ── Name: case-insensitive contains match ───────────────────
    const { data: cars, error } = await sb
      .from("cars").select("*")
      .eq("event_id", eventId).ilike("kid_name", `%${raw}%`);
    if (error || !cars?.length) { toast(`No cars found for "${raw}"`, false); return; }
    showFamily(cars, null);
    document.getElementById("tokenInput").value = "";
  }

  function statusLabel(s) {
    return s === 'legal' ? '✅ Legal' : s === 'not_legal' ? '❌ Not Legal' : '⏳ Pending';
  }

  function showFamily(cars, token) {
    // Sort by car_number numerically (lowest first)
    cars = [...cars].sort((a, b) => (a.car_number ?? 0) - (b.car_number ?? 0));
    document.getElementById("familyTitle").textContent = `${cars.length} Car${cars.length > 1 ? "s" : ""}`;
    document.getElementById("carList").innerHTML = cars.map(c => `
      <div class="fam-car" id="row_${c.id}">
        <div class="fam-info">
          <div class="fam-num">#${c.car_number}</div>
          <div class="fam-name">${c.kid_name}</div>
          <span class="badge badge-${c.legal_status}" id="badge_${c.id}">${statusLabel(c.legal_status)}</span>
        </div>
        <div class="fam-actions">
          <button class="insp-toggle-btn legal ${c.legal_status === 'legal' ? 'active' : ''}"
                  id="legal_${c.id}" onclick="setStatus('${c.id}', 'legal')">✓</button>
          <button class="insp-toggle-btn illegal ${c.legal_status === 'not_legal' ? 'active' : ''}"
                  id="illegal_${c.id}" onclick="setStatus('${c.id}', 'not_legal')">✗</button>
          <button class="btn btn-ghost-danger btn-sm" style="min-height:40px; padding:0 10px; font-size:0.75rem;"
                  onclick="askDelete('${c.id}', '#${c.car_number} ${c.kid_name}')">Del</button>
        </div>
      </div>`).join("");

    document.getElementById("familyOverlay").classList.add("open");
  }

  function applyStatusUI(carId, status) {
    const badge = document.getElementById('badge_'   + carId);
    const lBtn  = document.getElementById('legal_'   + carId);
    const iBtn  = document.getElementById('illegal_' + carId);
    if (badge) { badge.className = `badge badge-${status}`; badge.textContent = statusLabel(status); }
    if (lBtn)  lBtn.classList.toggle('active', status === 'legal');
    if (iBtn)  iBtn.classList.toggle('active', status === 'not_legal');
  }

  function askDelete(carId, label) {
    _pendingDeleteId = carId;
    document.getElementById('confirmMsg').textContent = `Delete ${label}? This cannot be undone.`;
    document.getElementById('confirmOverlay').classList.add('open');
  }

  function closeConfirm() {
    _pendingDeleteId = null;
    document.getElementById('confirmOverlay').classList.remove('open');
  }

  document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
    if (!_pendingDeleteId) return;
    const id = _pendingDeleteId;
    closeConfirm();
    const { error } = await sb.from('cars').delete().eq('id', id);
    if (error) { toast('Delete failed: ' + error.message, false); return; }
    const row = document.getElementById('row_' + id);
    if (row) row.remove();
    toast('Deleted.');
    loadTally();
  });

  function dismissFamily() {
    document.getElementById("familyOverlay").classList.remove("open");
    lastToken = null;
  }

  async function setStatus(carId, status) {
    const { error } = await sb.from('cars').update({ legal_status: status }).eq('id', carId);
    if (error) { toast('Update failed: ' + error.message, false); return; }
    applyStatusUI(carId, status);
    toast(status === 'legal' ? '✅ Legal' : '❌ Not Legal');
    loadTally();
  }

  function toast(msg, ok = true) {
    const el = document.getElementById("toast");
    if (!el) return;
    el.textContent = msg;
    el.className = ok ? "show ok" : "show err";
    setTimeout(() => el.className = "", 3000);
  }
</script>

</body>
</html>
